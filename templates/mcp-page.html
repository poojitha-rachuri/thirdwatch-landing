<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{title}} | Thirdwatch MCP</title>
<meta name="description" content="{{description}}">
<meta name="keywords" content="{{keywords}}">
<link rel="canonical" href="https://thirdwatch.dev/{{path}}">

<meta property="og:type" content="website">
<meta property="og:title" content="{{title}}">
<meta property="og:description" content="{{description}}">
<meta property="og:url" content="https://thirdwatch.dev/{{path}}">
<meta property="og:site_name" content="Thirdwatch">
<meta property="og:image" content="https://thirdwatch.dev/og-default.png">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{title}}">
<meta name="twitter:description" content="{{description}}">
<meta name="twitter:image" content="https://thirdwatch.dev/og-default.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/blog.css">

<script type="application/ld+json">{{webpageSchema}}</script>
<script type="application/ld+json">{{breadcrumbSchema}}</script>
<script type="application/ld+json">{{faqSchema}}</script>
<script src="/blog.js" defer></script>
</head>
<body>
<header class="site-header">
  <div class="container">
    <a href="/" class="brand">Thirdwatch</a>
    <nav>
      <a href="/#scrapers">Scrapers</a>
      <a href="/mcp/">MCP</a>
      <a href="/blog">Blog</a>
      <a href="https://apify.com/thirdwatch" target="_blank" rel="noopener">Apify Store</a>
    </nav>
  </div>
</header>

<main class="post mcp-page container">
  <nav class="breadcrumbs" aria-label="Breadcrumb">
    {{breadcrumbsHtml}}
  </nav>

  <article>
    {{content}}
  </article>
</main>

<footer class="site-footer">
  <div class="container">
    <p>Need help wiring up Thirdwatch MCP into Claude or Cursor? Email <a href="mailto:support@thirdwatch.dev">support@thirdwatch.dev</a>.</p>
    <p>© Thirdwatch 2026 · <a href="/">Home</a> · <a href="/mcp/">MCP</a> · <a href="/blog">Blog</a> · <a href="https://apify.com/thirdwatch" target="_blank" rel="noopener">Apify Store</a></p>
  </div>
</footer>
</body>
</html>
